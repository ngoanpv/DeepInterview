name: Deploy

# WP-12 — gated deploy (Singapore region; see docs/DEPLOY.md).
#
# This workflow is a SKETCH wired with placeholders + comments. It is safe by
# default: the destructive deploy commands are commented out, and each step
# gates on the relevant secrets being present (checked inside each step — note
# GitHub does NOT allow `secrets.*` in a job/workflow-level `if:`).
#
# Targets:
#   web    -> Vercel (region sin1)            — apps/web
#   agent  -> container image -> LiveKit Cloud Agents (Singapore) / Render / Fly (sin)
#
# Trigger: MANUAL ONLY (workflow_dispatch) until the deploy steps are real.
# We intentionally do NOT run on push to main yet — an unwired deploy would
# fail on every push. Re-add a `push:` trigger once the steps below are live.

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # --- Web -> Vercel (Singapore) --------------------------------------------
  deploy-web:
    name: Deploy web (Vercel · sin1)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Gate on Vercel secrets
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping web deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        if: steps.gate.outputs.enabled == 'true'
        # Version comes from package.json `packageManager` (pnpm@11.5.2);
        # pinning here too triggers ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy to Vercel (region sin1)
        if: steps.gate.outputs.enabled == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Region + build config come from vercel.json (regions: [sin1])."
          # pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          # pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"
          # pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          echo "(placeholder) uncomment the vercel CLI steps above to go live."

  # --- Agent image -> GHCR ---------------------------------------------------
  build-agent-image:
    name: Build + push agent image (GHCR)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-agent:latest
            ghcr.io/${{ github.repository }}-agent:${{ github.sha }}
          # Worker images need `--extra livekit`; build that variant separately
          # (e.g. a build-arg / dedicated stage) before deploying the worker.

  # --- Worker -> LiveKit Cloud Agents (Singapore) / Render / Fly (sin) -------
  deploy-agent-worker:
    name: Deploy agent worker (LiveKit Cloud · SGP)
    runs-on: ubuntu-latest
    needs: build-agent-image
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Gate on LiveKit secrets
        id: gate
        env:
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
        run: |
          if [ -z "$LIVEKIT_API_KEY" ]; then
            echo "LIVEKIT_API_KEY not set — skipping worker deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy worker to LiveKit Cloud Agents (Singapore region)
        if: steps.gate.outputs.enabled == 'true'
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          echo "Deploy the worker close to candidates in SEA (Singapore)."
          # Option A — LiveKit Cloud Agents (recommended; co-located w/ media):
          #   curl -sSL https://get.livekit.io/cli | bash
          #   lk agent deploy --region sin --subdomain <project> \
          #     --image ghcr.io/${{ github.repository }}-agent:${{ github.sha }}
          #
          # Option B — Render / Fly.io (region: sin):
          #   flyctl deploy --image ghcr.io/${{ github.repository }}-agent:${{ github.sha }} \
          #     --regions sin --app deepinterview-worker
          echo "(placeholder) uncomment one option above to go live."
